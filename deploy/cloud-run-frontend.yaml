# Cloud Run service manifest for the static Vue frontend (nginx on port 8080).
#
# Template — render via deploy/render-cloud-run.sh (do not apply raw templates).
#
# Required env vars for envsubst:
#   PROJECT_ID PROJECT_NUMBER REGION CLOUD_SQL_INSTANCE IMAGE_TAG
#
# Apply rendered manifest:
#   gcloud run services replace deploy/.generated/cloud-run-frontend.yaml \
#     --region=${REGION} --project=${PROJECT_ID}
#
# Domain mapping (see deploy/README.md):
#   Map keweenawendurance.com and www.keweenawendurance.com to this service,
#   or place Cloud Load Balancing in front with path rules:
#     /api/*  -> keweenaw-backend
#     /*      -> keweenaw-frontend

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: keweenaw-frontend
  labels:
    app: keweenaw
    component: frontend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: keweenaw-frontend@${PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 250
      timeoutSeconds: 300
      containers:
        - name: frontend
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/keweenaw/frontend:${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
            periodSeconds: 30
            failureThreshold: 3
