# Cloud Run service manifest for the Go API (hosted authority).
#
# Replace placeholders before apply:
#   $PROJECT_ID, $PROJECT_NUMBER, $REGION, $CLOUD_SQL_INSTANCE (e.g. keweenaw-prod)
#   Image tag (SHORT_SHA or latest from Cloud Build)
#   PROJECT_NUMBER: gcloud projects describe $PROJECT_ID --format='value(projectNumber)'
#
# Apply:
#   gcloud run services replace deploy/cloud-run-backend.yaml \
#     --region=$REGION --project=$PROJECT_ID
#
# Or export/edit an existing service and merge env/annotations from this file.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: keweenaw-backend
  labels:
    app: keweenaw
    component: backend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Cloud SQL Auth Proxy socket mount
        run.googleapis.com/cloudsql-instances: $PROJECT_ID:$REGION:$CLOUD_SQL_INSTANCE
        # Keep one warm instance for bridge WebSocket + low cold-start latency
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Bridge WebSocket: avoid CPU throttling while connections are idle
        run.googleapis.com/cpu-throttling: "false"
        # Sticky sessions help long-lived bridge WebSocket connections
        run.googleapis.com/session-affinity: "true"
        run.googleapis.com/execution-environment: gen2
        # Maps secretKeyRef names → Secret Manager paths (required for env var secrets)
        run.googleapis.com/secrets: keweenaw-db-password:projects/$PROJECT_NUMBER/secrets/keweenaw-db-password,keweenaw-jwt-secret:projects/$PROJECT_NUMBER/secrets/keweenaw-jwt-secret,keweenaw-organizer-pin:projects/$PROJECT_NUMBER/secrets/keweenaw-organizer-pin,keweenaw-bridge-token:projects/$PROJECT_NUMBER/secrets/keweenaw-bridge-token
    spec:
      serviceAccountName: keweenaw-backend@$PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - name: backend
          image: $REGION-docker.pkg.dev/$PROJECT_ID/keweenaw/backend:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: GO_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: info
            # Ephemeral container filesystem — not DR; Cloud SQL + GCS CSV are authoritative
            - name: DATA_DIR
              value: /app/data
            - name: RFID_HARDWARE
              value: "false"
            - name: RFID_INJECT
              value: "false"
            - name: PROXMARK3_ENABLED
              value: "false"
            - name: HOSTED_API_URL
              value: ""
            # Prefer GCS on Cloud Run (no persistent volume). Use LIVE_CSV_MIRROR_DIR only
            # if you mount a volume or sidecar; leave empty when GCS bucket is set.
            - name: GCS_LIVE_CSV_BUCKET
              value: $PROJECT_ID-keweenaw-live-csv
            - name: LIVE_CSV_MIRROR_DIR
              value: ""
            - name: CORS_ORIGINS
              value: https://keweenawendurance.com
            # Cloud SQL via Unix socket (requires cloudsql-instances annotation above)
            - name: DB_HOST
              value: /cloudsql/$PROJECT_ID:$REGION:$CLOUD_SQL_INSTANCE
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: keweenaw_timing
            - name: DB_USER
              value: timing_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keweenaw-db-password
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keweenaw-jwt-secret
                  key: latest
            - name: ORGANIZER_PIN
              valueFrom:
                secretKeyRef:
                  name: keweenaw-organizer-pin
                  key: latest
            - name: BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: keweenaw-bridge-token
                  key: latest
            - name: BRIDGE_DEVICE_ID
              value: laptop-finish-1
            # Optional Memorystore for leaderboard cache; app runs without Redis
            - name: REDIS_HOST
              value: ""
            - name: REDIS_PORT
              value: "6379"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
