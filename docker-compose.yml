version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - keweenaw-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=keweenaw_timing
      - DB_USER=timing_user
      - DB_PASSWORD=timing_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=development-secret-key-change-in-production
      - LOG_LEVEL=debug
      - ORGANIZER_PIN=1738
      - RFID_INJECT=true
      - PROXMARK3_ENABLED=true
      - HOSTED_API_URL=
      - DATA_DIR=/app/data
    volumes:
      - ./backend:/app
      - /app/vendor
      - backend_csv_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - keweenaw-network

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=keweenaw_timing
      - POSTGRES_USER=timing_user
      - POSTGRES_PASSWORD=timing_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timing_user -d keweenaw_timing"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - keweenaw-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - keweenaw-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - keweenaw-network

volumes:
  postgres_data:
  redis_data:
  backend_csv_data:

networks:
  keweenaw-network:
    driver: bridge
